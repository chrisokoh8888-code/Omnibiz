<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniBiz - One Dashboard. Multiple Businesses.</title>
  
  <!-- Bootstrap 5 CDN (production-ready) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body data-bs-theme="dark" class="bg-body-tertiary">
  <div id="app" class="min-vh-100">
    <!-- NAV -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary fixed-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
          <div class="bg-success rounded-3 d-flex align-items-center justify-content-center" style="width: 38px; height: 38px; font-size: 1.4rem;">📊</div>
          <span class="fs-3 fw-bold">OmniBiz</span>
        </a>
        <div id="nav-user" class="d-flex align-items-center gap-3"></div>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="pt-5 mt-5 container" id="main-content"></div>
  </div>

  <!-- Subscription Reminder Modal (Bootstrap Modal) -->
  <div class="modal fade" id="trial-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark border-secondary">
        <div class="modal-body text-center p-5">
          <h2 class="fs-2 fw-bold mb-3">Your trial ends soon!</h2>
          <p id="trial-days" class="fs-5 mb-4"></p>
          <button onclick="subscribeNow()" class="btn btn-success btn-lg w-100 py-3 fw-semibold">
            Upgrade to Full Access – ₦9,900/month
          </button>
          <p class="text-secondary mt-4 small">Email & SMS reminders have been sent.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="firebase.js"></script>
  <script src="app.js"></script>
</body>
</html>
